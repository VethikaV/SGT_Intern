<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Search</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet" />
</head>
<body style="background-color:#ffffff;">

<header>
    <style>
        html, body {
            overflow: hidden;
        }
        .dropbtn {
            background-color: #3498DB;
            color: white;
            padding: 10px;
            font-size: 14px;
            border: none;
            cursor: pointer;
        }
        .dropbtn:hover, .dropbtn:focus {
            background-color: #2980B9;
        }
        #myTable {
            margin-top: 20px;
            border-collapse: collapse;
            width: 70%;
        }
        #myTable th, #myTable td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
    </style>
</header>

<table border="0" width="70%">
    <tbody>
        <tr>
            <td style="font-family: calibri; font-size:28pt; color:#0099cc; font-weight: normal; text-align: center;">
                <p>
                    <span style="font-size:48px; background-color:white;">Build Your</span>
                    <span style="font-size:48px; color:#336699;">career, </span>
                    <span style="font-size:48px; background-color:white;">Empower Your</span>
                    <span style="font-size:48px; color:#336699;">future</span>
                </p>

                <!-- ✅ Fixed Search Bar -->
                <p>
                    <input type="text" id="myInput" placeholder="Search Job Title..." onkeyup="myFunction()" />
                    <input type="text" placeholder="Location" />
                    <button class="dropbtn">Search</button>
                </p>

                <button class="dropbtn">Sl.no</button>
                <button class="dropbtn">Job Title / Position</button>
                <button class="dropbtn">Job Location</button>
                <button class="dropbtn">No. of Years Exp</button>
                <button class="dropbtn">Click for More Details</button>

                <p></p>
                <button class="dropbtn">
                    <i class="fa fa-arrow-right">&nbsp; Apply Now</i>
                </button>
            </td>
        </tr>
    </tbody>
</table>

<!-- ✅ Fixed Job Listings Table -->
<table id="myTable" border="1" width="70%">
    <thead>
        <tr>
            <th>Sl.no</th>
            <th>Job Title</th>
            <th>Location</th>
            <th>Experience</th>
            <th>More Details</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>1</td>
            <td>Software Engineer</td>
            <td>New York</td>
            <td>2 Years</td>
            <td><button>View</button></td>
        </tr>
        <tr>
            <td>2</td>
            <td>Data Analyst</td>
            <td>San Francisco</td>
            <td>3 Years</td>
            <td><button>View</button></td>
        </tr>
    </tbody>
</table>

<!-- ✅ Fixed Search Script -->
<script>
function myFunction() {
    var input, filter, table, tr, td, i, txtValue;
    input = document.getElementById("myInput");
    filter = input.value.toUpperCase();
    table = document.getElementById("myTable");
    tr = table.getElementsByTagName("tr");

    for (i = 1; i < tr.length; i++) {  // Start from 1 to skip table headers
        td = tr[i].getElementsByTagName("td")[1];  // Search Job Title Column
        if (td) {
            txtValue = td.textContent || td.innerText;
            if (txtValue.toUpperCase().indexOf(filter) > -1) {
                tr[i].style.display = "";
            } else {
                tr[i].style.display = "none";
            }
        }
    }
}
</script>

</body>
</html>
